services:
  postgres:
    image: postgres:16
    container_name: cryptochat-postgres
    restart: always
    environment:
      POSTGRES_USER: cryptochat
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cryptochat
    ports:
      - "5432:5432"
    volumes:
      - cryptochat_postgres_data:/var/lib/postgresql/data

volumes:
  cryptochat_postgres_data: